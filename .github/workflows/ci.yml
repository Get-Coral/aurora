name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Typecheck, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

      - name: Build Docker image
        run: docker build . --tag aurora-ui:ci

  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Capacitor assets
        run: pnpm cap:sync

      - name: Assemble Android debug build
        run: pnpm android:assemble:debug
